<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brisk Academy · The 5 Cs of Credit &amp; Our Values</title>
<meta name="description" content="Staff learning screensaver — Brisk Credit core values, African Guarantee Fund (AGF) values, and the 5 Cs of Credit (Character, Capacity, Capital, Collateral, Conditions) applied the Brisk way." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Brisk Credit Ltd" />
<meta property="og:title" content="Brisk Academy — The 5 Cs of Credit" />
<meta property="og:description" content="Know your craft: Brisk values, AGF values and the 5 Cs of lending — Character, Capacity, Capital, Collateral, Conditions." />
<meta property="og:url" content="https://briskcredit.github.io/brisk-ads/academy.html" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
<style>
  :root{
    --orange:#FF6A18; --orange-soft:#FF8A45;
    --blue:#229CEF;   --sky:#6CC8FF;
    --green:#37B24D;  --green-soft:#69DB7C;
    --gold:#FFB45A;
    --ink:#06080E;    --paper:#EAF2FB;  --muted:#9FB2CC;
    --font:"Manrope","Segoe UI",system-ui,-apple-system,sans-serif;
    --serif:"Playfair Display",Georgia,serif;
    --accent:var(--orange);          /* recoloured per scene */
    --accent-soft:var(--orange-soft);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  body{font-family:var(--font);color:var(--paper);cursor:none;user-select:none;position:relative}

  /* ---------------- background ---------------- */
  #bg{position:fixed;inset:0;z-index:0;background:
      radial-gradient(120% 90% at 18% 6%, #0C1626 0%, #0A0F1A 46%, var(--ink) 76%),
      linear-gradient(180deg,#080C16 0%, #05070C 100%)}
  .aurora{position:fixed;border-radius:50%;filter:blur(64px);opacity:.42;z-index:2;mix-blend-mode:screen;pointer-events:none;will-change:transform;transition:background 1.2s ease}
  .a1{width:48vw;height:48vw;left:-8vw;top:-12vw;background:radial-gradient(circle,var(--accent) 0%,transparent 65%);animation:floatA 36s ease-in-out infinite}
  .a2{width:52vw;height:52vw;right:-12vw;bottom:-16vw;background:radial-gradient(circle,var(--blue) 0%,transparent 65%);animation:floatB 46s ease-in-out infinite}
  .a3{width:34vw;height:34vw;left:42vw;top:44vh;background:radial-gradient(circle,var(--accent-soft) 0%,transparent 70%);opacity:.2;animation:floatC 54s ease-in-out infinite}
  @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(6vw,5vh)}}
  @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-4vh)}}
  @keyframes floatC{0%,100%{transform:translate(0,0)}50%{transform:translate(-7vw,3vh)}}
  #net{position:fixed;inset:0;z-index:3;pointer-events:none}
  .vignette{position:fixed;inset:0;z-index:6;pointer-events:none;box-shadow:inset 0 0 28vw rgba(0,0,0,.6)}
  .grain{position:fixed;inset:-50%;z-index:7;pointer-events:none;opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

  /* ---------------- top bar ---------------- */
  .top{position:fixed;top:clamp(22px,4vh,48px);left:0;right:0;z-index:8;
    display:flex;justify-content:space-between;align-items:center;
    padding:0 clamp(34px,6vw,110px)}
  .brand{display:flex;align-items:baseline;gap:10px;filter:drop-shadow(0 6px 22px rgba(0,0,0,.5))}
  .wordmark{font-weight:800;font-size:clamp(26px,3.4vw,46px);letter-spacing:-1px;line-height:1;
    background:linear-gradient(120deg,#fff,var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
  .wordmark .dot{color:var(--orange);-webkit-text-fill-color:var(--orange)}
  .tag{font-weight:700;font-size:clamp(9px,1.1vw,13px);letter-spacing:4px;color:var(--muted);text-transform:uppercase}
  .clock{text-align:right;line-height:1}
  .clock .t{font-weight:800;font-size:clamp(22px,3vw,42px);letter-spacing:1px;
    background:linear-gradient(120deg,#fff,var(--accent-soft));-webkit-background-clip:text;background-clip:text;color:transparent}
  .clock .d{margin-top:7px;color:var(--muted);font-weight:600;font-size:clamp(10px,1.1vw,14px);letter-spacing:3px;text-transform:uppercase}

  /* chapter ribbon */
  .ribbon{position:fixed;top:clamp(92px,12.5vh,140px);left:clamp(34px,6vw,110px);z-index:8;
    display:inline-flex;align-items:center;gap:11px;padding:9px 20px;border-radius:999px;
    background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 22%,transparent),transparent);
    border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);backdrop-filter:blur(6px);
    color:var(--accent-soft);font-weight:700;letter-spacing:3px;font-size:clamp(10px,1.15vw,14px);text-transform:uppercase;
    transition:color 1s,border-color 1s}
  .ribbon .pip{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);animation:beat 1.7s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

  /* ---------------- stage / scenes ---------------- */
  .stage{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;
    padding:clamp(120px,17vh,190px) clamp(40px,7vw,140px) clamp(96px,13vh,150px)}
  .scene{position:absolute;width:min(1180px,86vw);opacity:0;visibility:hidden;
    transition:opacity .7s ease,visibility .7s;will-change:opacity}
  .scene.on{opacity:1;visibility:visible}

  /* reveal primitive — staggered via --d */
  .rv{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,.8,.24,1),transform .8s cubic-bezier(.16,.8,.24,1);transition-delay:var(--d,0s)}
  .scene.on .rv{opacity:1;transform:none}
  .rv.s{transform:translateY(0) scale(.86)}
  .scene.on .rv.s{transform:none}

  .eyebrow{display:inline-flex;align-items:center;gap:12px;color:var(--accent-soft);
    font-weight:700;font-size:clamp(11px,1.3vw,17px);letter-spacing:5px;text-transform:uppercase}
  .eyebrow::before{content:"";width:clamp(24px,3vw,50px);height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),transparent)}
  .script{font-family:var(--serif);font-style:italic;font-weight:600;color:var(--accent-soft);
    font-size:clamp(20px,2.5vw,40px);line-height:1.05;text-shadow:0 2px 24px color-mix(in srgb,var(--accent) 35%,transparent)}
  h1.big{font-weight:800;font-size:clamp(44px,7.6vw,124px);line-height:.98;letter-spacing:-2px;
    background:linear-gradient(180deg,#fff 0%,#CFE4FA 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 22px color-mix(in srgb,var(--accent) 40%,transparent))}
  h2.head{font-weight:800;font-size:clamp(34px,5.2vw,80px);line-height:1.02;letter-spacing:-1.4px;
    background:linear-gradient(180deg,#fff,#D8E7F7);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#C9D6E8;font-weight:500;font-size:clamp(16px,1.9vw,27px);line-height:1.5;max-width:32ch}
  .center{text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(14px,2.4vh,30px)}
  .center .sub{margin-inline:auto;max-width:40ch}

  /* core-values chips */
  .chips{display:flex;flex-wrap:wrap;gap:clamp(12px,1.6vw,22px);justify-content:center;max-width:1000px}
  .chip{display:inline-flex;align-items:center;gap:14px;padding:clamp(14px,1.8vh,22px) clamp(22px,2.4vw,38px);
    border-radius:18px;background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);
    font-weight:700;font-size:clamp(17px,2vw,30px);box-shadow:0 18px 40px rgba(0,0,0,.35)}
  .chip i{width:clamp(10px,1.2vw,15px);height:clamp(10px,1.2vw,15px);border-radius:50%;flex:none}

  /* value / C card grid */
  .grid{display:grid;gap:clamp(14px,1.6vw,22px);width:100%}
  .grid.g5{grid-template-columns:repeat(5,1fr)}
  .grid.g3{grid-template-columns:repeat(3,1fr)}
  .card{position:relative;border-radius:22px;padding:clamp(18px,2.4vh,30px) clamp(16px,1.6vw,24px);
    background:linear-gradient(165deg,rgba(255,255,255,.08),rgba(255,255,255,.015));
    border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(7px);
    box-shadow:0 24px 50px rgba(0,0,0,.4);overflow:hidden;text-align:left}
  .card::before{content:"";position:absolute;left:0;top:0;height:4px;width:100%;background:linear-gradient(90deg,var(--c,var(--accent)),transparent)}
  .card .ico{width:clamp(40px,4vw,58px);height:clamp(40px,4vw,58px);margin-bottom:14px}
  .card .ico svg{width:100%;height:100%}
  .card h3{font-weight:800;font-size:clamp(17px,1.7vw,25px);letter-spacing:-.3px;color:#fff;margin-bottom:7px}
  .card p{color:#B9C8DE;font-weight:500;font-size:clamp(12px,1.05vw,16px);line-height:1.42}
  .card .num{font-weight:800;font-size:clamp(20px,2vw,30px);color:var(--c,var(--accent));margin-top:10px}

  /* big single-C detail scene */
  .clayout{display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(28px,4vw,72px);align-items:center;width:100%}
  .cmark{position:relative;display:flex;align-items:center;justify-content:center}
  .cletter{font-weight:800;font-size:clamp(150px,26vw,400px);line-height:.8;letter-spacing:-8px;
    background:linear-gradient(160deg,var(--c) 0%,#fff 130%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 40px color-mix(in srgb,var(--c) 55%,transparent))}
  .cbadge{position:absolute;right:6%;bottom:8%;width:clamp(60px,8vw,120px);height:clamp(60px,8vw,120px);
    border-radius:24px;background:linear-gradient(160deg,color-mix(in srgb,var(--c) 30%,transparent),transparent);
    border:1px solid color-mix(in srgb,var(--c) 55%,transparent);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
  .cbadge svg{width:60%;height:60%}

  /* 3D hero object */
  .cobj{position:relative;width:min(42vw,540px);aspect-ratio:1;display:flex;align-items:center;justify-content:center;margin:auto}
  .cobj .obj{position:relative;z-index:3;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 36px 60px rgba(0,0,0,.65));
    -webkit-mask-image:radial-gradient(circle at 50% 48%, #000 60%, transparent 76%);
    mask-image:radial-gradient(circle at 50% 48%, #000 60%, transparent 76%);
    animation:bob 7s ease-in-out infinite;will-change:transform}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  .cobj .halo{position:absolute;z-index:1;inset:0;margin:auto;width:80%;height:80%;border-radius:50%;filter:blur(54px);
    background:radial-gradient(circle,color-mix(in srgb,var(--c) 60%,transparent) 0%,transparent 68%);animation:pulse 7s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(.94);opacity:.75}50%{transform:scale(1.08);opacity:1}}
  .cobj .ghost{position:absolute;z-index:2;font-weight:800;font-size:min(46vw,560px);line-height:1;color:var(--c);opacity:.07;
    pointer-events:none;user-select:none}
  .cobj .ring{position:absolute;z-index:1;inset:0;margin:auto;width:104%;height:104%;border-radius:50%;
    border:1px dashed color-mix(in srgb,var(--c) 40%,transparent);animation:spin 60s linear infinite}
  .cobj .ring.r2{width:122%;height:122%;border-color:color-mix(in srgb,var(--c) 22%,transparent);animation-duration:90s;animation-direction:reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cstep{color:var(--c);font-weight:800;letter-spacing:4px;font-size:clamp(12px,1.3vw,17px);text-transform:uppercase}
  .cright h2{font-weight:800;font-size:clamp(40px,5.6vw,86px);line-height:1;letter-spacing:-1.6px;margin:6px 0 14px;
    background:linear-gradient(180deg,#fff,#D8E7F7);-webkit-background-clip:text;background-clip:text;color:transparent}
  .cdef{color:#CCDAEC;font-weight:500;font-size:clamp(16px,1.9vw,27px);line-height:1.45;max-width:30ch;margin-bottom:clamp(16px,2.4vh,26px)}
  .briskway{position:relative;padding:clamp(14px,2vh,20px) clamp(18px,1.8vw,26px) clamp(14px,2vh,20px) clamp(26px,2.6vw,38px);
    border-radius:16px;background:linear-gradient(120deg,color-mix(in srgb,var(--c) 14%,transparent),rgba(255,255,255,.02));
    border:1px solid color-mix(in srgb,var(--c) 30%,transparent);max-width:40ch}
  .briskway::before{content:"";position:absolute;left:0;top:14%;bottom:14%;width:5px;border-radius:3px;background:var(--c);box-shadow:0 0 18px var(--c)}
  .briskway .lab{display:flex;align-items:center;gap:9px;color:var(--c);font-weight:800;letter-spacing:2px;font-size:clamp(11px,1.15vw,15px);text-transform:uppercase;margin-bottom:7px}
  .briskway p{color:#DCE7F4;font-weight:500;font-size:clamp(14px,1.45vw,21px);line-height:1.4}

  /* object thumbnail row (overview) */
  .objrow{display:flex;gap:clamp(8px,1.4vw,26px);justify-content:center;flex-wrap:wrap;margin:1.4vh 0 .4vh}
  .othumb{display:flex;flex-direction:column;align-items:center;gap:6px;width:clamp(108px,14vw,180px)}
  .othumb .otimg{position:relative;width:100%;aspect-ratio:1}
  .othumb .otimg img{position:relative;z-index:2;width:100%;height:100%;object-fit:contain;
    -webkit-mask-image:radial-gradient(circle at 50% 48%,#000 58%,transparent 75%);mask-image:radial-gradient(circle at 50% 48%,#000 58%,transparent 75%);
    filter:drop-shadow(0 16px 26px rgba(0,0,0,.6));animation:bob 7s ease-in-out infinite}
  .othumb:nth-child(2) .otimg img{animation-delay:-1.2s}
  .othumb:nth-child(3) .otimg img{animation-delay:-2.4s}
  .othumb:nth-child(4) .otimg img{animation-delay:-3.6s}
  .othumb:nth-child(5) .otimg img{animation-delay:-4.8s}
  .othumb .othalo{position:absolute;z-index:1;inset:0;margin:auto;width:74%;height:74%;border-radius:50%;filter:blur(26px);
    background:radial-gradient(circle,color-mix(in srgb,var(--c) 55%,transparent),transparent 70%)}
  .othumb span{font-weight:700;font-size:clamp(12px,1.3vw,18px);color:#D7E4F5}

  /* draw-in svg strokes */
  .draw{stroke-dasharray:600;stroke-dashoffset:600;transition:stroke-dashoffset 1.5s ease .25s}
  .scene.on .draw{stroke-dashoffset:0}

  /* progress dots */
  .dots{position:fixed;left:50%;transform:translateX(-50%);bottom:clamp(86px,12vh,120px);z-index:8;
    display:flex;gap:9px}
  .dots b{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .5s}
  .dots b.on{width:26px;border-radius:5px;background:var(--accent);box-shadow:0 0 14px var(--accent)}

  /* top progress bar */
  #prog{position:fixed;top:0;left:0;height:3px;width:0;z-index:9;
    background:linear-gradient(90deg,var(--accent),var(--accent-soft));box-shadow:0 0 12px var(--accent)}

  /* ---------------- footer ---------------- */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:8}
  .bar .line{height:5px;background:linear-gradient(90deg,var(--orange) 0%,var(--gold) 40%,var(--blue) 100%)}
  .bar .info{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;
    padding:clamp(11px,1.7vh,18px) clamp(34px,6vw,110px);
    background:linear-gradient(180deg,rgba(6,8,14,0),rgba(6,8,14,.82) 60%)}
  .contact{display:flex;align-items:center;gap:clamp(12px,2.2vw,36px);flex-wrap:wrap;
    color:#D7E4F5;font-weight:600;font-size:clamp(11px,1.3vw,18px);letter-spacing:.4px}
  .contact .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .contact b{color:#fff}
  .cbk{color:#6E809B;font-weight:500;font-size:clamp(10px,1vw,13px);letter-spacing:.6px;text-align:right}

  .toast{position:fixed;z-index:9;left:50%;bottom:14vh;transform:translateX(-50%);
    background:rgba(12,17,26,.82);border:1px solid rgba(255,255,255,.18);color:#DCE7F4;
    padding:10px 20px;border-radius:999px;font-size:14px;letter-spacing:.5px;backdrop-filter:blur(8px);transition:opacity .6s}
  .toast.hide{opacity:0;pointer-events:none}

  /* portrait / narrow */
  @media (max-aspect-ratio:1/1){
    .clayout{grid-template-columns:1fr;gap:2vh;text-align:center;justify-items:center}
    .cright h2{margin-inline:auto}.cdef,.briskway{margin-inline:auto}
    .grid.g5{grid-template-columns:repeat(2,1fr)}
    .cletter{font-size:clamp(120px,40vw,260px)}
  }
  @media (max-width:760px){ .grid.g5,.grid.g3{grid-template-columns:1fr 1fr} .scene{width:90vw} }
</style>
</head>
<body>
  <div id="bg"></div>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
  <canvas id="net"></canvas>
  <div id="prog"></div>

  <header class="top">
    <div class="brand">
      <span class="wordmark">brisk<span class="dot">.</span></span>
      <span class="tag">Academy</span>
    </div>
    <div class="clock"><div class="t" id="clk">--:--</div><div class="d" id="date">—</div></div>
  </header>

  <div class="ribbon"><span class="pip"></span><span id="chapter">Know your craft</span></div>

  <main class="stage" id="stage"><!-- scenes injected --></main>

  <div class="dots" id="dots"></div>

  <footer class="bar">
    <div class="line"></div>
    <div class="info">
      <div class="contact">
        <span><b>+254 713 329 268</b></span><span class="dot"></span>
        <span>Lipa na M-PESA · Paybill <b>4106969</b></span><span class="dot"></span>
        <span>Commodore Suites, Kilimani · Nairobi</span>
      </div>
      <div class="cbk">Brisk Credit Ltd is regulated by the Central Bank of Kenya.</div>
    </div>
  </footer>

  <div class="toast" id="toast">Click or press F for fullscreen signage</div>

<script>
/* ============================================================
   ICONS — inline line-art (stroke uses currentColor)
   ============================================================ */
const I = {
  shieldCheck:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path class="draw" d="M32 6 54 14v16c0 14-9 24-22 28C19 54 10 44 10 30V14z"/><path class="draw" d="M23 32l7 7 12-14"/></svg>`,

  bulb:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path class="draw" d="M32 8c11 0 18 8 18 18 0 7-4 11-7 15-2 2-2 4-2 6H23c0-2 0-4-2-6-3-4-7-8-7-15 0-10 7-18 18-18z"/><path class="draw" d="M26 56h12M28 50h8"/></svg>`,
  unity:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><circle class="draw" cx="22" cy="24" r="10"/><circle class="draw" cx="42" cy="24" r="10"/><path class="draw" d="M12 52c0-7 5-12 10-12s10 5 10 12M32 52c0-7 5-12 10-12s10 5 10 12"/></svg>`,
  target:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><circle class="draw" cx="30" cy="34" r="20"/><circle class="draw" cx="30" cy="34" r="10"/><path class="draw" d="M30 34 56 8M44 8h12v12"/></svg>`,
  badge:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><rect class="draw" x="12" y="10" width="40" height="44" rx="8"/><circle class="draw" cx="32" cy="26" r="7"/><path class="draw" d="M20 46c2-7 6-10 12-10s10 3 12 10"/></svg>`,

const stage=document.getElementById('stage');
const dotsBox=document.getElementById('dots');
const prog=document.getElementById('prog');
const chapterEl=document.getElementById('chapter');
const a1=document.querySelector('.a1'),a3=document.querySelector('.a3');

const els = scenes.map((s,i)=>{
  const sec=document.createElement('section');
  sec.className='scene'; sec.innerHTML=s.html; stage.appendChild(sec);
  const b=document.createElement('b'); dotsBox.appendChild(b);
  return sec;
});
const dotEls=[...dotsBox.children];

let idx=-1, timer=null, progRAF=null, segStart=0, segDur=0;
function setAccent(a,soft){
  const r=document.documentElement.style;
  r.setProperty('--accent',a); r.setProperty('--accent-soft',soft);
}
function show(n){
  if(idx>=0) els[idx].classList.remove('on');
  idx=n;
  const s=scenes[n];
  setAccent(s.accent,s.soft);
  chapterEl.textContent=s.chapter;
  dotEls.forEach((d,i)=>d.classList.toggle('on',i===n));
  // little aurora pulse on transition
  a1.style.opacity='0.62'; setTimeout(()=>a1.style.opacity='',260);
  els[n].classList.add('on');
  // progress bar
  segStart=performance.now(); segDur=s.dur;
  clearTimeout(timer);
  timer=setTimeout(()=>show((n+1)%scenes.length), s.dur);
}
function progFrame(t){
  progRAF=requestAnimationFrame(progFrame);
  if(document.hidden) return;
  const p=Math.min(1,(t-segStart)/segDur);
  prog.style.width=(p*100)+'%';
}
show(0); requestAnimationFrame(progFrame);

// keep timing sane if tab was hidden a long time
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ segStart=performance.now(); } });

/* ---------------- live clock ---------------- */
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('date').textContent=
    n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick,15000);

/* ---------------- particle constellation (30fps, pauses hidden) ---------------- */
const cv=document.getElementById('net'),ctx=cv.getContext('2d');
let W,H,DPR,nodes=[],time=0,_last=0;
const BRAND=[[255,106,24],[34,156,239],[108,200,255],[255,180,90]];
function size(){
  DPR=Math.min(window.devicePixelRatio||1,1.25);
  W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const count=Math.round(Math.min(48,Math.max(24,(innerWidth*innerHeight)/40000)));
  nodes=Array.from({length:count},mk);
}
function mk(){const c=BRAND[(Math.random()*BRAND.length)|0];
  return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.16*DPR,vy:(Math.random()-.5)*.16*DPR,
    r:(Math.random()*1.6+.7)*DPR,c,tw:Math.random()*6.28};}
const LINK=150;
function frame(ts){
  requestAnimationFrame(frame);
  if(document.hidden) return;
  if(ts-_last<32) return; _last=ts; time+=.018;
  ctx.clearRect(0,0,W,H);
  for(const n of nodes){n.vx*=.99;n.vy*=.99;n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1;}
  for(let i=0;i<nodes.length;i++){const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){const b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
      if(d<LINK*DPR){const al=(1-d/(LINK*DPR))*(.22+.05*Math.sin(time+i+j));
        ctx.strokeStyle=`rgba(${(a.c[0]+b.c[0])/2},${(a.c[1]+b.c[1])/2},${(a.c[2]+b.c[2])/2},${al})`;
        ctx.lineWidth=DPR*.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}}
  for(const n of nodes){n.tw+=.04;const al=.45+Math.sin(n.tw)*.33;
    ctx.fillStyle=`rgba(${n.c[0]},${n.c[1]},${n.c[2]},${al})`;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fill();}
}
addEventListener('resize',size); size(); requestAnimationFrame(frame);

/* ---------------- fullscreen + toast ---------------- */
const toast=document.getElementById('toast');
function goFS(){const el=document.documentElement;
  (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen||(()=>{})).call(el);}
window.addEventListener('click',goFS);
window.addEventListener('keydown',e=>{ if((e.key||'').toLowerCase()==='f'){e.preventDefault();goFS();} });
setTimeout(()=>toast.classList.add('hide'),6500);
document.addEventListener('fullscreenchange',()=>{ if(document.fullscreenElement)toast.classList.add('hide'); });
</script>
