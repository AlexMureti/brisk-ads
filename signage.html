<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brisk Credit · Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --orange:#FF6A18;
    --orange-soft:#FF8A45;
    --blue:#229CEF;
    --blue-2:#1FA0E0;
    --sky:#6CC8FF;
    --ink:#06080E;
    --ink-2:#0B0F1A;
    --paper:#EAF2FB;
    --muted:#9FB2CC;
    --font:"Manrope","Segoe UI",system-ui,-apple-system,sans-serif;
    --slide-hue:0deg;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink);}
  body{
    font-family:var(--font);
    color:var(--paper);
    cursor:none;                 /* screensaver: no cursor */
    user-select:none;
    position:relative;
  }

  /* ---------- background layers ---------- */
  #bg{position:fixed;inset:0;z-index:0;background:
      radial-gradient(120% 90% at 18% 12%, #0E1626 0%, var(--ink) 55%),
      linear-gradient(180deg,#080B14 0%, #05070C 100%);}
  #ascii-bg{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.14;mix-blend-mode:screen;filter:blur(.3px)}
  /* drifting aurora blooms */
  .aurora{position:fixed;border-radius:50%;filter:blur(80px);opacity:.55;z-index:2;mix-blend-mode:screen;pointer-events:none}
  .a1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,var(--orange) 0%,transparent 65%);animation:floatA 34s ease-in-out infinite,colorShift 12s ease-in-out infinite}
  .a2{width:50vw;height:50vw;right:-12vw;bottom:-16vw;background:radial-gradient(circle,var(--blue) 0%,transparent 65%);animation:floatB 44s ease-in-out infinite,colorShift 14s ease-in-out infinite}
  .a3{width:30vw;height:30vw;left:42vw;top:48vh;background:radial-gradient(circle,var(--sky) 0%,transparent 70%);opacity:.30;animation:floatC 52s ease-in-out infinite,colorShift 16s ease-in-out infinite}
  #net{position:fixed;inset:0;z-index:3;pointer-events:none}
  @keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,5vh) scale(1.12)}}
  @keyframes floatB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vw,-4vh) scale(1.15)}}
  @keyframes floatC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-7vw,3vh) scale(.9)}}

  /* film grain + vignette for a premium finish */
  .vignette{position:fixed;inset:0;z-index:6;pointer-events:none;
    box-shadow:inset 0 0 28vw rgba(0,0,0,.62);}
  .grain{position:fixed;inset:-50%;z-index:7;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain 1.1s steps(4) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-4%,3%)}50%{transform:translate(3%,-3%)}75%{transform:translate(-3%,-2%)}100%{transform:translate(2%,3%)}}

  /* ---------- stage ---------- */
  .stage{position:fixed;inset:0;z-index:5;display:grid;
    grid-template-columns:1.05fr .95fr;align-items:center;
    padding:clamp(28px,5vw,90px) clamp(34px,6vw,110px);}

  /* top bar */
  .top{position:fixed;top:clamp(26px,4vh,54px);left:0;right:0;z-index:8;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:0 clamp(34px,6vw,110px);}
  .logo{height:clamp(46px,6vh,82px);width:auto;filter:drop-shadow(0 6px 22px rgba(0,0,0,.5));}
  .clock{text-align:right;line-height:1}
  .clock .t{font-weight:800;font-size:clamp(30px,4.6vw,64px);letter-spacing:1px;
    background:linear-gradient(120deg,#fff 0%,var(--sky) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .clock .d{margin-top:8px;color:var(--muted);font-weight:500;font-size:clamp(12px,1.4vw,19px);letter-spacing:3px;text-transform:uppercase}

  /* left: rotating messages */
  .left{max-width:46vw}
  .eyebrow{display:inline-flex;align-items:center;gap:12px;color:var(--orange-soft);
    font-weight:700;font-size:clamp(12px,1.35vw,18px);letter-spacing:5px;text-transform:uppercase}
  .eyebrow::before{content:"";width:clamp(26px,3vw,52px);height:3px;border-radius:2px;
    background:linear-gradient(90deg,var(--orange),transparent)}
  .head{margin:clamp(14px,2vh,26px) 0 0;font-weight:800;
    font-size:clamp(38px,6vw,92px);line-height:1.02;letter-spacing:-1.5px;
    background:linear-gradient(180deg,#FFFFFF 0%, #CFE0F4 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 30px rgba(0,0,0,.25);
    filter:drop-shadow(0 0 18px hsla(var(--slide-hue),100%,50%,.4));
    animation:headlineShimmer 3s ease-in-out infinite;
    position:relative;z-index:1}
  .sub{margin-top:clamp(14px,2vh,24px);color:var(--muted);font-weight:500;
    font-size:clamp(16px,1.9vw,28px);line-height:1.4;max-width:30ch}
  .accent{margin-top:clamp(18px,2.5vh,30px);height:5px;width:0;border-radius:3px;
    background:linear-gradient(90deg,var(--orange),var(--blue));box-shadow:0 0 24px rgba(255,106,24,.5)}

  .slide{opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s cubic-bezier(.16,.8,.24,1);
    position:absolute;pointer-events:none}
  .slide.on{opacity:1;transform:translateY(0);position:relative}
  .slide.on .accent{width:clamp(90px,11vw,190px);transition:width 1.1s .25s cubic-bezier(.16,.8,.24,1)}
  .leftwrap{position:relative;min-height:46vh;display:flex;align-items:center}

  /* right: Africa client hero */
  .hero{justify-self:center;position:relative;display:flex;align-items:center;justify-content:center}
  .halo{position:absolute;width:84%;height:84%;border-radius:50%;filter:blur(46px);
    background:radial-gradient(circle, rgba(255,106,24,.55) 0%, rgba(34,156,239,.32) 45%, transparent 70%);
    animation:pulse 7s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(.96);opacity:.8}50%{transform:scale(1.08);opacity:1}}
  .africa{width:min(38vw,520px);max-height:74vh;object-fit:contain;position:relative;
    filter:drop-shadow(0 26px 60px rgba(0,0,0,.55));animation:bob 8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(-1.2deg)}}
  .ring{position:absolute;width:min(40vw,560px);height:min(40vw,560px);border-radius:50%;
    border:1px dashed rgba(108,200,255,.22);animation:spin 60s linear infinite}
  .ring.r2{width:min(46vw,640px);height:min(46vw,640px);border-color:rgba(255,138,69,.16);animation-duration:90s;animation-direction:reverse}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* enhanced hero shimmer + glow */
  .hero::before{content:'';position:absolute;inset:-20%;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.1), transparent 60%);
    animation:shimmer 6s ease-in-out infinite;z-index:-1}
  @keyframes shimmer{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.15)}}

  /* accent pulse on slide change */
  @keyframes accentPulse{0%{box-shadow:0 0 8px rgba(255,106,24,.4),inset 0 0 12px rgba(255,106,24,.2)}
    50%{box-shadow:0 0 20px rgba(255,106,24,.8),inset 0 0 20px rgba(255,106,24,.5)}
    100%{box-shadow:0 0 8px rgba(255,106,24,.4),inset 0 0 12px rgba(255,106,24,.2)}}
  .slide.on .accent{animation:accentPulse 1.8s ease-in-out infinite}

  /* floating particles on text */
  .head::after{content:'';position:absolute;width:100%;height:100%;
    background:linear-gradient(135deg, transparent 0%, rgba(108,200,255,.08) 50%, transparent 100%);
    animation:textGlow 8s ease-in-out infinite;pointer-events:none}
  @keyframes textGlow{0%,100%{opacity:.2;transform:translateX(-100%)}50%{opacity:.6;transform:translateX(100%)}}
  @keyframes headlineShimmer{0%,100%{filter:drop-shadow(0 0 8px hsla(var(--slide-hue),100%,50%,.2))}
    50%{filter:drop-shadow(0 0 28px hsla(var(--slide-hue),100%,50%,.8))}}

  /* color shift on aurora blooms */
  @keyframes colorShift{0%{filter:hue-rotate(0deg)}25%{filter:hue-rotate(15deg)}50%{filter:hue-rotate(0deg)}75%{filter:hue-rotate(-15deg)}100%{filter:hue-rotate(0deg)}}
  .a1{animation:floatA 34s ease-in-out infinite,colorShift 12s ease-in-out infinite}
  .a2{animation:floatB 44s ease-in-out infinite,colorShift 14s ease-in-out infinite}
  .a3{animation:floatC 52s ease-in-out infinite,colorShift 16s ease-in-out infinite}

  /* enhanced ring animation */
  @keyframes spinPulse{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.08)}100%{transform:rotate(360deg) scale(1)}}
  .ring{animation:spinPulse 60s ease-in-out infinite}
  .ring.r2{animation:spinPulse 90s ease-in-out infinite reverse}

  /* bottom contact bar */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:8}
  .bar .line{height:5px;background:linear-gradient(90deg,var(--orange) 0%,var(--orange) 32%,var(--blue) 100%)}
  .bar .info{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;
    padding:clamp(12px,1.8vh,20px) clamp(34px,6vw,110px);
    background:linear-gradient(180deg, rgba(6,8,14,0) 0%, rgba(6,8,14,.78) 60%);}
  .contact{display:flex;align-items:center;gap:clamp(14px,2.4vw,40px);flex-wrap:wrap;
    color:#D7E4F5;font-weight:600;font-size:clamp(12px,1.4vw,19px);letter-spacing:.4px}
  .contact .dot{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 12px var(--orange)}
  .contact b{color:#fff}
  .cbk{color:#6E809B;font-weight:500;font-size:clamp(10px,1.05vw,14px);letter-spacing:.6px;text-align:right}

  /* setup toast (auto-hides) */
  .toast{position:fixed;z-index:9;left:50%;bottom:13vh;transform:translateX(-50%);
    background:rgba(12,17,26,.82);border:1px solid rgba(108,200,255,.25);
    color:#CFE0F4;padding:10px 20px;border-radius:999px;font-size:14px;letter-spacing:.5px;
    backdrop-filter:blur(8px);transition:opacity .6s;cursor:pointer}
  .toast.hide{opacity:0;pointer-events:none}

  @media (max-aspect-ratio:1/1){
    .stage{grid-template-columns:1fr;justify-items:center;text-align:center;gap:3vh}
    .left{max-width:88vw}.sub{max-width:38ch;margin-inline:auto}
    .eyebrow{justify-content:center}.leftwrap{min-height:auto;order:2}
    .hero{order:1}.africa{width:min(62vw,420px)}
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="ascii-bg"></canvas>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
  <canvas id="net"></canvas>

  <header class="top">
    <img class="logo" src="brisk-logo.png" alt="Brisk Credit Ltd" />
    <div class="clock"><div class="t" id="clk">--:--</div><div class="d" id="date">—</div></div>
  </header>

  <main class="stage">
    <section class="left">
      <div class="leftwrap" id="slides"><!-- slides injected --></div>
    </section>
    <section class="hero">
      <div class="ring r2"></div>
      <div class="ring"></div>
      <div class="halo"></div>
      <img class="africa" src="brisk-mark.png" alt="A Brisk client" />
    </section>
  </main>

  <footer class="bar">
    <div class="line"></div>
    <div class="info">
      <div class="contact">
        <span><b>+254 713 329 268</b></span><span class="dot"></span>
        <span>Lipa na M-PESA · Paybill <b>4106969</b></span><span class="dot"></span>
        <span>Commodore Suites, Kilimani · Nairobi</span>
      </div>
      <div class="cbk">Brisk Credit Ltd is regulated by the Central Bank of Kenya.</div>
    </div>
  </footer>

  <div class="toast" id="toast">Click or press F for fullscreen signage</div>

<script>
/* ---------------- rotating messages ---------------- */
const SLIDES = [
  {eye:"Who we are",      head:"Your flexible<br>financial partner.", sub:"Working capital that grows Kenya's businesses."},
  {eye:"How we lend",     head:"No collateral.<br>Just potential.",   sub:"SHABA business loans, disbursed straight to M-PESA."},
  {eye:"Our promise",     head:"Tuliona wewe.<br>We saw you.",        sub:"Finance with a human touch — not just paperwork."},
  {eye:"Our impact",      head:"30,000+ businesses<br>funded.",        sub:"$10M+ disbursed · 95% client satisfaction."},
  {eye:"Madaraka ya biashara", head:"Grow your business,<br>your way.", sub:"The freedom to move with your hustle."},
];
const wrap = document.getElementById('slides');
SLIDES.forEach((s,i)=>{
  const el=document.createElement('div'); el.className='slide'+(i===0?' on':'');
  el.innerHTML=`<span class="eyebrow">${s.eye}</span><h1 class="head">${s.head}</h1><p class="sub">${s.sub}</p><div class="accent"></div>`;
  wrap.appendChild(el);
});
const slideEls=[...document.querySelectorAll('.slide')];
let si=0;
setInterval(()=>{
  slideEls[si].classList.remove('on');
  si=(si+1)%slideEls.length;
  slideEls[si].classList.add('on');
  // trigger visual cascade on slide change
  const hue=(si*60)%360;
  document.documentElement.style.setProperty('--slide-hue',hue+'deg');
  // brief flash on aurora
  document.querySelector('.a1').style.opacity='0.75';
  setTimeout(()=>document.querySelector('.a1').style.opacity='0.55',200);
},6800);

/* ---------------- live clock ---------------- */
function tick(){
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0');
  const mm=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clk').textContent=`${hh}:${mm}`;
  document.getElementById('date').textContent=
    n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick,1000*15);

/* ---------------- particle constellation and ASCII background ---------------- */
const bgAscii=document.getElementById('ascii-bg'), bgCtx=bgAscii.getContext('2d');
const cv=document.getElementById('net'), ctx=cv.getContext('2d');
let W,H,DPR,nodes=[],orbs=[],asciiCols,asciiRows,time=0,heroX=0,heroY=0,heroR=180;
const BRAND=[[255,106,24],[34,156,239],[108,200,255]];
const ASCII_CHARS=" .,:;irsXA253hMH#@";
function size(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  bgAscii.width=innerWidth*DPR; bgAscii.height=innerHeight*DPR;
  bgAscii.style.width=innerWidth+'px'; bgAscii.style.height=innerHeight+'px';
  bgCtx.setTransform(DPR,0,0,DPR,0,0);
  asciiCols=Math.ceil(innerWidth/30);
  asciiRows=Math.ceil(innerHeight/30);
  heroX = innerWidth * .72 * DPR;
  heroY = innerHeight * .45 * DPR;
  heroR = 180 * DPR;
  const count=Math.round(Math.min(90,Math.max(46,(innerWidth*innerHeight)/22000)));
  nodes=Array.from({length:count},()=>mk());
  orbs=Array.from({length:9},()=>mkOrb());
}
function mk(){const c=BRAND[(Math.random()*BRAND.length)|0];
  return{x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.18*DPR,vy:(Math.random()-.5)*.18*DPR,
    r:(Math.random()*1.7+0.7)*DPR,c,tw:Math.random()*Math.PI*2,
    ax:0,ay:0,mass:Math.random()*.5+1};}
function mkOrb(){const c=BRAND[(Math.random()*2)|0];
  return{x:Math.random()*W,y:Math.random()*H+H,r:(Math.random()*60+30)*DPR,
    vy:-(Math.random()*.25+.08)*DPR,c,a:Math.random()*.06+.02};}
const LINK=140;
function drawAsciiBg(){
  bgCtx.clearRect(0,0,innerWidth,innerHeight);
  bgCtx.font="700 18px Consolas, Courier New, monospace";
  bgCtx.textBaseline="top";
  for(let row=0;row<asciiRows;row++){
    for(let col=0;col<asciiCols;col++){
      const x=col*30;
      const y=row*30;
      const phase=(col*.16+row*.18+time*.12);
      const light=.24+.1*Math.sin(phase)+.06*Math.cos(row*.22+time*.1);
      const idx=Math.floor(Math.max(0,Math.min(ASCII_CHARS.length-1,light*(ASCII_CHARS.length-1))));
      const ch=ASCII_CHARS[idx];
      const alpha=.06 + .04*Math.sin(phase*1.2);
      bgCtx.fillStyle=`rgba(235,245,255,${alpha})`;
      bgCtx.fillText(ch, x, y);
    }
  }
}
function frame(){
  time+=.018;
  drawAsciiBg();
  ctx.clearRect(0,0,W,H);
  // soft rising bokeh
  for(const o of orbs){
    o.y+=o.vy; if(o.y<-o.r){o.y=H+o.r;o.x=Math.random()*W;}
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},${o.a})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,7); ctx.fill();
  }
  // apply forces & update nodes
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];n.ax=0;n.ay=0;
    const dhx=n.x-heroX;
    const dhy=n.y-heroY;
    const dhd=Math.hypot(dhx,dhy);
    if(dhd<heroR*1.5){
      const repel=Math.pow(Math.max(0,1-dhd/(HERO_R*1.5)),2)*0.012;
      n.ax+=dhx/dhd*repel*DPR;n.ay+=dhy/dhd*repel*DPR;
    }
    n.vx*=.985;n.vy*=.985;
    n.vx+=n.ax;n.vy+=n.ay;
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1;
  }
  // links with color variation
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j], dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
      if(d<LINK*DPR){
        const al=(1-d/(LINK*DPR))*(.25+.06*Math.sin(time+i+j));
        ctx.strokeStyle=`rgba(${(a.c[0]+b.c[0])/2},${(a.c[1]+b.c[1])/2},${(a.c[2]+b.c[2])/2},${al})`;
        ctx.lineWidth=DPR*.6;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
  }
  for(const n of nodes){
    n.tw+=.04+Math.random()*.02;
    const a=.5+Math.sin(n.tw)*.35+.15*Math.sin(time*.5+n.x*.001);
    ctx.fillStyle=`rgba(${n.c[0]},${n.c[1]},${n.c[2]},${a})`;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fill();
  }
  requestAnimationFrame(frame);
}
addEventListener('resize',size); size(); frame();

/* ---------------- fullscreen + toast ---------------- */
const toast=document.getElementById('toast');
function goFS(){ const el=document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen || (()=>{});
  req.call(el);
}
function handleFullscreenKey(event){
  const key = event.key ? String(event.key).toLowerCase() : '';
  if (key === 'f'){
    event.preventDefault();
    goFS();
  }
}
if (document.body){
  document.body.tabIndex = -1;
  document.body.style.outline = 'none';
  document.body.focus();
}
window.addEventListener('click',goFS);
window.addEventListener('keydown',handleFullscreenKey);
window.addEventListener('keypress',handleFullscreenKey);
setTimeout(()=>toast.classList.add('hide'),6500);
document.addEventListener('fullscreenchange',()=>{ if(document.fullscreenElement||document.webkitFullscreenElement||document.msFullscreenElement)toast.classList.add('hide'); });
</script>
</body>
</html>
